name: Build API APK

on:
  push:
    paths:
      - "api-android-v2-0.2.0-source.zip"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Extract project
        run: |
          rm -rf build-src
          mkdir -p build-src
          unzip -q api-android-v2-0.2.0-source.zip -d build-src
          test -f build-src/api-android/settings.gradle.kts

      - name: Build debug APK
        working-directory: build-src/api-android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: api-debug-apk
          path: build-src/api-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Run tests
        continue-on-error: true
        working-directory: build-src/api-android
        run: ./gradlew test --stacktrace

      - name: Run lint
        continue-on-error: true
        working-directory: build-src/api-android
        run: ./gradlew lint --stacktrace
